name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: uv sync --group dev

    - name: Lint with ruff
      run: uv run ruff check --output-format=github src/slv

    - name: Type checking with pyright
      if: ${{ !cancelled() }}
      run: uv run pyright src/slv

    - name: Check docstring coverage
      if: ${{ !cancelled() }}
      run: uv run docstr-coverage src/slv --skip-magic --skip-init
